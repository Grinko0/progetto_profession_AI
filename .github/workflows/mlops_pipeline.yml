name: MLOps Sentiment Analysis CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout del codice dal Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 

    - name: 2. Setup di Python (Versione 3.10)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Installazione delle dipendenze (Librerie ML)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Esecuzione Analisi Esplorativa (EDA)
      run: |
        echo "[CI] Avvio EDA..."
        python src/eda.py

    - name: 5. Esecuzione Data Pre-processing e Tokenizzazione
      run: |
        echo "[CI] Avvio Pre-processing..."
        python src/data_prep.py

    - name: 6. Esecuzione Training Loop (Smoke Test)
      run: |
        echo "[CI] Avvio Addestramento di test..."
        python src/train.py

    - name: 7. Salvataggio degli artefatti (Grafici e Modello)
      uses: actions/upload-artifact@v4
      with:
        name: mlops-artifacts
        path: |
          plots/
          saved_model/

    - name: 8. Deploy e Sync con Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
        git remote add hf https://huggingface.co/spaces/Grinko/sentiment-analysis-mlops
        git push --force https://Grinko:$HF_TOKEN@huggingface.co/spaces/Grinko/sentiment-analysis-mlops main
        
        git remote add hf https://huggingface.co/spaces/TUO_USER/TUO_SPACE
        git push --force https://TUO_USER:$HF_TOKEN@huggingface.co/spaces/TUO_USER/TUO_SPACE main
