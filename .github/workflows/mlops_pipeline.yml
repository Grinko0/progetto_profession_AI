name: MLOps Sentiment Analysis CI/CD

# Quando deve partire questa pipeline?
# 1. Ogni volta che facciamo un "push" (carichiamo nuovo codice) sul branch main
# 2. Ogni volta che apriamo una Pull Request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Usiamo l'ambiente virtuale standard fornito da GitHub
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout del codice dal Repository
      uses: actions/checkout@v4

    - name: 2. Setup di Python (Versione 3.10)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. Installazione delle dipendenze (Librerie ML)
      run: |
        python -m pip install --upgrade pip
        # Installiamo le librerie esatte che abbiamo usato finora
        pip install torch pandas matplotlib seaborn datasets transformers evaluate scikit-learn tqdm

    - name: 4. Esecuzione Analisi Esplorativa (EDA)
      run: |
        echo "[CI] Avvio EDA..."
        python src/eda.py

    - name: 5. Esecuzione Data Pre-processing e Tokenizzazione
      run: |
        echo "[CI] Avvio Pre-processing..."
        python src/data_prep.py

    - name: 6. Esecuzione Training Loop (Smoke Test)
      # Nota: il nostro script 'train.py' ha già il limite di 10 batch, 
      # perfetto per non far andare in timeout il runner gratuito di GitHub.
      run: |
        echo "[CI] Avvio Addestramento di test..."
        python src/train.py

    - name: 7. Salvataggio degli artefatti (Grafici e Modello)
      # Salviamo i file generati per poterli scaricare e analizzare
      uses: actions/upload-artifact@v4
      with:
        name: mlops-artifacts
        path: |
          plots/
          saved_model/